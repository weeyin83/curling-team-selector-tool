name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_GRASS_02A930903 }}
          action: "upload"
          ###### Repository/Build Configurations ######
          # This is a pure static HTML/CSS/JS site with no build step,
          # so we tell Oryx not to try `npm run build` — otherwise it
          # detects Node from the environment and fails with:
          #   "Could not find either 'build' or 'build:azure' node
          #    under 'scripts' in package.json"
          app_location: "/"        # App source code path
          api_location: ""         # No Azure Functions API
          output_location: ""      # No build output — files are served as-is from app_location
          skip_app_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_GRASS_02A930903 }}
          app_location: "/"
          action: "close"
